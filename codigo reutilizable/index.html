<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Permite que la página se vea bien en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectHub — Internal Manager</title>

    <!-- Google Fonts: Syne para títulos (display), Outfit para cuerpo -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Estilos globales de la aplicación -->
    <link rel="stylesheet" href="./global.css" />
  </head>
  <body>

    <!-- 
      #app es el contenedor principal de toda la SPA.
      El router inyectará el HTML de cada vista aquí.
      No hay múltiples páginas HTML: todo se renderiza en este único div.
    -->
    <div id="app">
      <!-- El loader inicial se muestra mientras main.js arranca -->
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- 
      type="module" permite usar import/export de ES6.
      Vite procesa este archivo y resuelve todos los imports.
    -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
